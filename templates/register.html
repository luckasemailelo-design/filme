<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuário - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <h1>🎬 Streaming 2.0</h1>
            <h2>Registro de Novo Usuário</h2>
            {% if erro %}
                <div class="alert error">{{ erro }}</div>
            {% endif %}
            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" required placeholder="Nome completo">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="email@exemplo.com">
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label for="dias">Dias de validade (deixe em branco para ilimitado)</label>
                    <input type="number" id="dias" name="dias" min="1" placeholder="Ex: 30">
                </div>
                <div class="form-group checkbox">
                    <input type="checkbox" id="is_admin" name="is_admin">
                    <label for="is_admin">Administrador?</label>
                </div>
                <button type="submit" class="btn">Registrar</button>
                <a href="{{ url_for('admin') }}" class="btn btn-outline" style="margin-top: 0.5rem;">Cancelar</a>
            </form>
            <p class="auth-link"><a href="{{ url_for('admin') }}">Voltar ao painel</a></p>
        </div>
    </div>
</body>
</html>
