<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Streaming 2.0{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <nav class="navbar" id="navbar">
            <div class="nav-brand">
                <a href="{{ url_for('index') }}">Streaming 2.0</a>
            </div>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="{{ url_for('index') }}">Início</a></li>
                <li><a href="{{ url_for('series') }}">Séries</a></li>
                <li><a href="{{ url_for('filmes') }}">Filmes</a></li>
                {% if usuario_atual and usuario_atual.is_admin %}
                    <li><a href="{{ url_for('admin') }}">Admin</a></li>
                {% endif %}
                <li><a href="{{ url_for('perfil') }}">
                    {% if usuario_atual and usuario_atual.profile_pic %}
                        <img src="{{ url_for('static', filename=usuario_atual.profile_pic) }}" alt="Perfil" class="profile-avatar">
                    {% else %}
                        <i class="fas fa-user-circle"></i>
                    {% endif %}
                </a></li>
                <li><a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i></a></li>
            </ul>
            <div class="nav-toggle" id="nav-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
